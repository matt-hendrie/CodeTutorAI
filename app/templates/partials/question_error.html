<!-- Question Error Partial -->
<div class="bg-red-50 border border-red-200 rounded-xl p-6">
    <div class="flex items-start gap-3">
        <svg class="h-6 w-6 text-red-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" />
        </svg>
        <div class="space-y-2">
            <h3 class="text-red-800 font-semibold">Something went wrong</h3>
            <p class="text-red-700 text-sm">{{ error_message }}</p>
            {% if raw_response %}
            <details class="mt-2">
                <summary class="cursor-pointer text-red-600 hover:text-red-800 text-xs font-medium">Show raw response</summary>
                <pre class="mt-2 text-xs text-red-600 bg-red-100 p-3 rounded overflow-x-auto">{{ raw_response }}</pre>
            </details>
            {% endif %}
            <p class="text-red-600 text-sm mt-2">Please try again or choose different parameters.</p>
        </div>
    </div>
</div>
